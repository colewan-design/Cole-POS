  <head>
    <meta charset="UTF-8" />

    <title>Cole POS — Free Point of Sale for Coffee Shops, Grocers & Restaurants</title>
    <meta
      name="description"
      content="Cole POS turns a tablet into a real point-of-sale register for coffee shops, grocery stores, and restaurants — offline-capable, with live analytics and flexible payments. Free during early access."
    />
    <link rel="canonical" href="https://colepos.app/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cole POS" />
    <meta property="og:title" content="Cole POS — Free Point of Sale for Coffee Shops, Grocers & Restaurants" />
    <meta
      property="og:description"
      content="One app, three businesses. Cole POS becomes a different point-of-sale depending on whether you run a café, a grocery, or a restaurant. Checkout in under 10 seconds."
    />
    <meta property="og:url" content="https://colepos.app/" />
    <meta property="og:image" content="https://colepos.app/hero.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cole POS — Free Point of Sale for Coffee Shops, Grocers & Restaurants" />
    <meta
      name="twitter:description"
      content="One app, three businesses. Checkout in under 10 seconds, works offline, free during early access."
    />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Cole POS",
        "url": "https://colepos.app/",
        "logo": "https://colepos.app/icon.png"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is Cole POS really free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — Cole POS is free for the entire early access period. There's no trial countdown and no credit card required to get started."
            }
          },
          {
            "@type": "Question",
            "name": "Does Cole POS work without an internet connection?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Cole POS is local-first: the register keeps taking orders and charging customers while offline, then syncs automatically once you're back online."
            }
          },
          {
            "@type": "Question",
            "name": "What kind of business is Cole POS built for?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Cole POS adapts its layout and catalog structure to three business modes: Coffee Shop, Grocery Store, and Restaurant. Pick the one that matches your business and the register reconfigures automatically."
            }
          },
          {
            "@type": "Question",
            "name": "What hardware do I need to run Cole POS?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Any modern tablet, phone, or laptop with a web browser. No proprietary terminal or dedicated hardware is required to start selling."
            }
          },
          {
            "@type": "Question",
            "name": "What payment methods does Cole POS support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Cash, card, and e-wallet payments are all supported at checkout, with change calculated automatically."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="landing-app"></div>
    <script type="module" src="/src/landing/main.ts"></script>
  </body>
</html>
